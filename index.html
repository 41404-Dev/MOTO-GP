<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTO Finger</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; padding: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        canvas { border: 4px solid #444; border-radius: 10px; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2); }
        /* 🛠️ เอา transform: scaleX(-1) ออกเพื่อให้กล้องไม่กลับด้านกระจก */
        #video-container { position: absolute; top: 20px; left: 20px; opacity: 0.8; pointer-events: none; border-radius: 10px; overflow: hidden; border: 2px solid #0ff; box-shadow: 0 0 10px #0ff; }
        video { width: 160px; height: 120px; display: block; }
        #instructions { position: absolute; bottom: 20px; text-align: center; color: #aaa; font-size: 14px; max-width: 600px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>
    
    <div id="instructions">
        🎮 <strong>วิธีเล่น MOTO Finger:</strong> ชู **"นิ้วชี้"** ขึ้นมาแล้วเลื่อนซ้าย-ขวาหน้ากล้องเพื่อควบคุมรถมอเตอร์ไซค์ <br>
        ⚡ หลบรถคันอื่นและสิ่งกีดขวางบนถนน | ขับขึ้น **แผ่นทางเหิน (Ramp)** สีเหลืองดำเพื่อกระโดดข้ามรถไฟยาว!
    </div>

<script>
let videoElement;
let playerX = 200;
let playerY = 480; 
let playerSize = 65; 
let targetX = 200; 

// ตัวแปรสำหรับเก็บรูปภาพ
let playerImg, sedanImg, pickupImg, truckImg, oilImg, coneImg, ghostImg, trainImg, rampImg;

// ระบบกระโดด
let jumpHeight = 0;
let jumpVelocity = 0;
let gravity = 0.6;
let isJumping = false;

// ตัวแปรเกม
let score = 0;
let highScore = 0;
let showNewRecord = false;
let baseSpeed = 5;
let gameState = 0;
let cameraReady = false;
let playFrames = 0; 

// อุปสรรคและไอเทม
let obstacles = [];
let train = null;
let ramp = null;
let particles = [];
let floatingTexts = [];

// เอฟเฟกต์และโหมดพิเศษ
let isGhost = false;
let ghostTimer = 0;
let isSlippery = false;
let slipperyTimer = 0;
let speedPenalty = 0;
let penaltyTimer = 0;
let darkness = 0; 

let spawnTimer = 0;
let trainTimer = 0;
let roadOffset = 0;

function preload() {
    playerImg = loadImage('player.png');
    sedanImg = loadImage('sedan.png');
    pickupImg = loadImage('pickup.png');
    truckImg = loadImage('truck.png');
    oilImg = loadImage('oil.png');
    coneImg = loadImage('cone.png');
    ghostImg = loadImage('ghost_item.png');
    trainImg = loadImage('train.png');
    rampImg = loadImage('ramp.png');
}

function setup() {
    createCanvas(400, 600);
    frameRate(60); 
    videoElement = document.getElementById('webcam');
    
    highScore = int(localStorage.getItem('motoHighScore')) || 0;

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    
    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });
    
    hands.onResults(onHandResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({ image: videoElement });
            if (!cameraReady) {
                cameraReady = true;
                gameState = 1;
            }
        },
        width: 160,
        height: 120
    });
    camera.start();
}

function onHandResults(results) {
    if (gameState === 2 && results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        let hand = results.multiHandLandmarks[0];
        let indexFinger = hand[8]; 
        
        // ล็อคพิกัดการคำนวณให้สัมพันธ์กับการขยับมือจริง (ขวาไปขวา ซ้ายไปซ้าย) แม่นยำ 100%
        targetX = map(indexFinger.x, 0.2, 0.8, width, 0, true);
    }
}

function resetGame() {
    obstacles = [];
    train = null;
    ramp = null;
    particles = [];
    floatingTexts = [];
    score = 0;
    playFrames = 0; 
    playerX = width / 2;
    targetX = width / 2;
    jumpHeight = 0;
    jumpVelocity = 0;
    isJumping = false;
    spawnTimer = 0;
    trainTimer = 0;
    
    showNewRecord = false;
    isGhost = false;
    ghostTimer = 0;
    isSlippery = false;
    slipperyTimer = 0;
    speedPenalty = 0;
    penaltyTimer = 0;
    
    gameState = 2;
}

function mousePressed() {
    if (gameState === 1 || gameState === 3) {
        resetGame();
    }
}

function draw() {
    background(30, 150, 50);
    
    fill(50);
    noStroke();
    rect(40, 0, width - 80, height);
    
    fill(200);
    rect(40, 0, 5, height);
    rect(width - 45, 0, 5, height);

    if (gameState === 0) {
        drawMessage("กำลังเชื่อมต่อกล้อง...", "กรุณารอสักครู่");
        return;
    } else if (gameState === 1) {
        // 🛠️ เปลี่ยนชื่อเกมในหน้าแรก
        drawMessage("MOTO Finger", "คลิกที่หน้าจอเพื่อเริ่มเกม!");
        return;
    } else if (gameState === 3) {
        drawMessage("GAME OVER", "คะแนนของคุณ: " + score + "\nคลิกที่หน้าจอเพื่อเล่นใหม่");
        return;
    }

    if (gameState === 2) {
        playerX = lerp(playerX, targetX, 0.18);
        playerX = constrain(playerX, 65, width - 65);
    }

    let currentSpeed = baseSpeed + (score * 0.002) - speedPenalty;
    if (currentSpeed < 3) currentSpeed = 3; 

    roadOffset += currentSpeed;
    if (roadOffset > 40) roadOffset = 0;
    fill(255);
    for (let i = -40; i < height; i += 40) {
        rect(width / 2 - 2, i + roadOffset, 4, 20);
    }

    if (score > highScore) {
        if (highScore > 0 && !showNewRecord) {
            showNewRecord = true;
        }
        highScore = score;
        localStorage.setItem('motoHighScore', highScore);
    }

    if (isSlippery) {
        slipperyTimer--;
        playerX += sin(frameCount * 0.8) * 7; 
        if (frameCount % 3 === 0) {
            particles.push({ x: playerX, y: playerY + 30, alpha: 200, colorStr: "rgba(238, 198, 91, " }); 
        }
        if (slipperyTimer <= 0) isSlippery = false;
    }

    if (isGhost) {
        ghostTimer--;
        if (ghostTimer <= 0) isGhost = false;
    }

    if (speedPenalty > 0) {
        penaltyTimer--;
        if (penaltyTimer <= 0) speedPenalty = 0;
    }

    if (isJumping) {
        jumpHeight += jumpVelocity;
        jumpVelocity -= gravity;
        
        if (jumpHeight <= 0) {
            jumpHeight = 0;
            isJumping = false;
        }
    }

    let trainSpawnThreshold = 400 - (currentSpeed * 3);
    let timeBeforeTrainToClear = 130; 
    let isCloseToTrain = (trainTimer > trainSpawnThreshold - timeBeforeTrainToClear);

    spawnTimer++;
    let spawnDelay = 75 - (currentSpeed * 1.5);
    if (spawnDelay < 35) spawnDelay = 35;

    if (spawnTimer > spawnDelay && !train && !ramp && !isCloseToTrain) { 
        let rand = random(100);
        if (rand < 60) {
            let types = ['sedan', 'pickup', 'truck'];
            let type = random(types);
            
            let w = type === 'truck' ? 70 : 58; 
            let h = type === 'truck' ? 130 : 95; 
            
            obstacles.push({
                x: random(45, width - 45 - w),
                y: -h, w: w, h: h, speed: currentSpeed * 0.8, type: type
            });
        } else if (rand < 78) {
            let w = 90, h = 55;
            obstacles.push({
                x: random(45, width - 45 - w),
                y: -h, w: w, h: h, speed: currentSpeed, type: 'oil'
            });
        } else if (rand < 97) {
            let w = 45, h = 55;
            obstacles.push({
                x: random(45, width - 45 - w),
                y: -h, w: w, h: h, speed: currentSpeed, type: 'cone'
            });
        } else {
            if (!isGhost) { 
                let w = 55, h = 55;
                obstacles.push({
                    x: random(50, width - 50 - w),
                    y: -h, w: w, h: h, speed: currentSpeed, type: 'ghost_item'
                });
            } else {
                let w = 45, h = 55;
                obstacles.push({
                    x: random(45, width - 45 - w),
                    y: -h, w: w, h: h, speed: currentSpeed, type: 'cone'
                });
            }
        }
        spawnTimer = 0;
    }

    trainTimer++;
    if (trainTimer > trainSpawnThreshold && !train && !ramp) {
        let trackY = -220; 
        ramp = { x: random(80, width - 180), y: trackY + 110, w: 100, h: 100 }; 
        train = { x: 40, y: trackY, w: width - 80, h: 90 };
        trainTimer = 0;
    }

    if (train) {
        train.y += currentSpeed; 
        
        fill(40);
        rect(40, train.y + 20, width - 80, 45); 
        fill(100);
        rect(40, train.y + 25, width - 80, 4); 
        rect(40, train.y + 55, width - 80, 4); 

        image(trainImg, train.x, train.y, train.w, train.h);

        if (playerX > train.x - 10 && playerX < train.x + train.w + 10 &&
            playerY > train.y && playerY < train.y + train.h) {
            if (jumpHeight < 45 && !isGhost) gameState = 3; 
        }
        if (train.y > height + 150) train = null; 
    }

    if (ramp) {
        ramp.y += currentSpeed;
        image(rampImg, ramp.x, ramp.y, ramp.w, ramp.h);

        if (playerX > ramp.x - 25 && playerX < ramp.x + ramp.w + 25 &&
            playerY > ramp.y && playerY < ramp.y + ramp.h && !isJumping) {
            isJumping = true;
            jumpVelocity = 14; 
        }
        if (ramp.y > height) ramp = null;
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        obs.y += currentSpeed;
        
        if (obs.type === 'sedan' || obs.type === 'pickup' || obs.type === 'truck') {
            let imgToDraw = sedanImg;
            if(obs.type === 'pickup') imgToDraw = pickupImg;
            if(obs.type === 'truck') imgToDraw = truckImg;
            
            image(imgToDraw, obs.x, obs.y, obs.w, obs.h);
            
            if (jumpHeight < 25 && !isGhost) { 
                if (playerX + 20 > obs.x && playerX - 20 < obs.x + obs.w &&
                    playerY + 35 > obs.y && playerY - 35 < obs.y + obs.h) {
                    gameState = 3;
                }
            }
        } else if (obs.type === 'oil') {
            if (darkness > 0) {
                push();
                noStroke();
                fill(245, 212, 114, 50);
                rect(obs.x - 5, obs.y - 5, obs.w + 10, obs.h + 10, 10);
                pop();
            }
            image(oilImg, obs.x, obs.y, obs.w, obs.h);

            if (jumpHeight < 15 && !isGhost) {
                if (playerX + 15 > obs.x && playerX - 15 < obs.x + obs.w &&
                    playerY + 20 > obs.y && playerY - 20 < obs.y + obs.h) {
                    if (!isSlippery) {
                        isSlippery = true;
                        slipperyTimer = 60; 
                        floatingTexts.push({ x: playerX, y: playerY - 50, text: "SLIPPERY!", r: 245, g: 212, b: 114, size: 18, timer: 45 });
                    }
                }
            }
        } else if (obs.type === 'cone') {
            image(coneImg, obs.x, obs.y, obs.w, obs.h);

            if (jumpHeight < 25 && !isGhost) {
                if (playerX + 18 > obs.x && playerX - 18 < obs.x + obs.w &&
                    playerY + 25 > obs.y && playerY - 25 < obs.y + obs.h) {
                    score = max(0, score - 50); 
                    speedPenalty = 3; 
                    penaltyTimer = 90;
                    floatingTexts.push({ x: playerX, y: playerY - 50, text: "-50 คะแนน", r: 255, g: 50, b: 50, size: 18, timer: 45 });
                    obstacles.splice(i, 1);
                    continue;
                }
            }
        } else if (obs.type === 'ghost_item') {
            push();
            translate(obs.x + obs.w/2, obs.y + obs.h/2);
            rotate(frameCount * 0.05);
            if (darkness > 0) {
                noStroke();
                fill(0, 255, 255, 60);
                ellipse(0, 0, obs.w + 15, obs.h + 15);
            }
            imageMode(CENTER);
            image(ghostImg, 0, 0, obs.w, obs.h);
            pop();

            if (playerX + 25 > obs.x && playerX - 25 < obs.x + obs.w &&
                playerY + 25 > obs.y && playerY - 25 < obs.y + obs.h) {
                isGhost = true;
                ghostTimer = 150; 
                floatingTexts.push({ x: playerX, y: playerY - 50, text: "GHOST MODE!", r: 0, g: 255, b: 255, size: 20, timer: 60 });
                obstacles.splice(i, 1);
                continue;
            }
        }

        if (obs.y > height + 50) {
            obstacles.splice(i, 1);
            if (obs.type !== 'ghost_item' && obs.type !== 'oil') {
                score += 10;
            }
        }
    }

    drawPlayer(currentSpeed);

    let cycle = playFrames % 3000; 
    if (cycle < 1200) {
        darkness = 0; 
    } else if (cycle >= 1200 && cycle < 1600) {
        darkness = map(cycle, 1200, 1600, 0, 110); 
    } else if (cycle >= 1600 && cycle < 2400) {
        darkness = 110; 
    } else {
        darkness = map(cycle, 2400, 3000, 110, 0); 
    }

    if (darkness > 0) {
        fill(0, 0, 0, darkness);
        rect(0, 0, width, height);

        push();
        fill(255, 255, 200, darkness * 0.25);
        noStroke();
        triangle(playerX, playerY - 20, playerX - 100, playerY - 260, playerX + 100, playerY - 260);
        fill(255, 255, 200, darkness * 0.15);
        triangle(playerX, playerY - 20, playerX - 60, playerY - 180, playerX + 60, playerY - 180);
        pop();

        for (let obs of obstacles) {
            if (obs.type === 'sedan' || obs.type === 'pickup' || obs.type === 'truck') {
                push();
                fill(255, 255, 200, darkness * 0.35);
                noStroke();
                triangle(obs.x + obs.w/2, obs.y + obs.h, obs.x - 45, obs.y + obs.h + 180, obs.x + obs.w + 45, obs.y + obs.h + 180);
                pop();
            }
        }
    }

    drawFloatingTexts();

    fill(0, 0, 0, 180);
    rect(0, 0, width, 40);
    fill(255);
    textSize(18);
    textAlign(LEFT);
    text("SCORE: " + score, 15, 26);
    
    if (showNewRecord && frameCount % 30 < 15) {
        fill(255, 215, 0);
        textAlign(RIGHT);
        text("🏆 NEW RECORD!", width - 15, 26);
    }

    if (gameState === 2) {
        playFrames++;
        if (frameCount % 3 === 0) {
            score++;
        }
    }
}

function drawPlayer(speed) {
    push();
    let currentScale = 1 + (jumpHeight * 0.005);
    translate(playerX, playerY);
    scale(currentScale);
    
    if (isGhost) {
        push();
        noFill();
        let alphaWave = 150 + sin(frameCount * 0.2) * 80;
        stroke(0, 255, 255, alphaWave * 0.6);
        strokeWeight(4);
        ellipse(0, 0, playerSize * 1.3, playerSize * 1.3);
        stroke(0, 255, 255, alphaWave * 0.3);
        strokeWeight(8);
        ellipse(0, 0, playerSize * 1.5, playerSize * 1.5);
        pop();
    }

    if (jumpHeight > 0) {
        fill(0, 0, 0, 80);
        ellipse(0, jumpHeight + 20, playerSize, playerSize/1.5);
    } else {
        if (frameCount % 3 === 0) {
            let pCol = isGhost ? "rgba(0, 255, 255, " : "rgba(200, 200, 200, ";
            particles.push({x: playerX, y: playerY + 45, alpha: 255, colorStr: pCol});
        }
    }
    
    let playerAlpha = isGhost ? 110 : 255; 

    tint(255, playerAlpha);
    imageMode(CENTER);
    image(playerImg, 0, 0, 50, 100); 
    pop();

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.y += speed * 0.5;
        p.alpha -= 8;
        noStroke();
        fill(p.colorStr + (p.alpha/255) + ")");
        ellipse(p.x + random(-8, 8), p.y, 10, 10);
        if (p.alpha <= 0) particles.splice(i, 1);
    }
}

function drawFloatingTexts() {
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        let ft = floatingTexts[i];
        ft.y -= 1.5;
        ft.timer--;
        fill(ft.r, ft.g, ft.b, map(ft.timer, 0, 45, 0, 255));
        textSize(ft.size);
        textAlign(CENTER);
        text(ft.text, ft.x, ft.y);
        if (ft.timer <= 0) {
            floatingTexts.splice(i, 1);
        }
    }
}

// 🛠️ ฟังก์ชันแสดงข้อความหน้าเมนูและ Game Over
function drawMessage(title, subtitle) {
    fill(0, 0, 0, 200);
    rect(0, 0, width, height);
    fill(0, 255, 255);
    textSize(32);
    textAlign(CENTER);
    text(title, width/2, height/2 - 40);
    fill(255);
    textSize(16);
    text(subtitle, width/2, height/2 + 5);

    if (gameState === 3) {
        fill(255, 215, 0);
        textSize(20);
        text("🏆 HIGH SCORE: " + highScore, width/2, height/2 + 65);
    }
}
</script>
</body>
</html>
